name: 卓予定の自動収集（15分毎）

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存インストール
        run: pip install -q "discord.py>=2.3" python-dotenv

      - name: 卓部屋フォーラムを収集
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          BOARD_GUILD_ID: ${{ vars.BOARD_GUILD_ID || '1023884809774305301' }}
          BOARD_FORUMS: ${{ vars.BOARD_FORUMS || '🏡卓部屋一覧-test' }}
          LIMIN_ROLE_ID: ${{ vars.LIMIN_ROLE_ID || '1001840163724464270' }}  # 辺境TRPG村「領民」ロール（後輩くん確認済み2026-07-08）＝GM在籍判定に使用。ロール再作成でIDが変わったらrepo VariablesでLIMIN_ROLE_IDを上書き
          BOARD_OUT: sessions.json
        run: python collect/collect_sessions.py

      - name: 変化があればコミット
        run: |
          if git diff --quiet -- sessions.json; then
            echo "変化なし＝コミットしない"
          else
            git config user.name "polistes-board"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sessions.json
            git commit -m "🐝 卓予定を自動更新"
            # push競合(手動push/他run/daily_calendarと重なると非fast-forwardで弾かれる)対策＝rebaseして最大5回リトライ
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash && git push; then
                echo "push成功（試行 $i）"; break
              fi
              echo "⚠ push競合→rebaseリトライ $i/5"; sleep 3
            done
          fi
